# Configuración para Docker
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://mysql:3306/techshop_db}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:techshop}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:techshop123}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA/Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true

# JWT
jwt.secret=${JWT_SECRET:TechShop2024SecretKeyForJWTTokenGeneration}
jwt.expiration=${JWT_EXPIRATION:86400000}

# Server
server.port=8080

# Logging
logging.level.com.tiendaonline=INFO
logging.level.org.hibernate.SQL=DEBUG