spring:
  application:
    name: tienda-online

  # ==================== BASE DE DATOS (PostgreSQL - Render) ====================
  datasource:
    url: ${DATABASE_URL}

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

  # ==================== JWT ====================
  jwt:
    secret: ${JWT_SECRET}
    expiration: ${JWT_EXPIRATION}

  # ==================== CORREO ====================
  mail:
    host: ${MAIL_HOST}
    port: ${MAIL_PORT}
    username: ${MAIL_USERNAME}
    password: ${MAIL_PASSWORD}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

  # ==================== MERCADO PAGO ====================
  mercadopago:
    access-token: ${MP_ACCESS_TOKEN}
    domain: ${MP_DOMAIN}
    frontend-url: ${MP_FRONTEND_URL}